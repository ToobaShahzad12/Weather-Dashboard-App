<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark shadow-sm">
<div class="container">
<h2 class="text-white fw-bold m-0">Weather Dashboard</h2>
</div>
</nav>

<!-- Search Section -->
<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-8">

<div class="card border-0 shadow-lg rounded-4 p-4">

<input type="text" id="city" class="form-control form-control-lg mb-3" placeholder="Enter city name">

<button class="btn btn-primary btn-lg w-100 mb-3" onclick="getWeather()">
Search Weather
</button>

<div id="error" class="text-danger text-center mb-3 fw-bold"></div>

<ul id="history" class="list-group mb-3"></ul>

<button class="btn btn-outline-dark w-100" onclick="toggleMode()" id="modeBtn">
Dark Mode
</button>

</div>

</div>
</div>
</div>

<!-- Weather Result -->
<div class="container pb-5">
<div class="row justify-content-center">
<div class="col-md-8">

<div id="weatherCard" class="card border-0 shadow rounded-4 d-none">
<div class="card-body text-center p-5">

<h2 id="cityName" class="fw-bold mb-4"></h2>
<p id="temp" class="fs-4 fw-semibold"></p>
<p id="condition" class="fs-5"></p>
<p id="humidity" class="fs-5"></p>
<p id="date" class="text-muted mt-4"></p>

</div>
</div>

</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
